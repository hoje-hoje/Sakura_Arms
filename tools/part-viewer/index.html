<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 파트 뷰어</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  :root {
    --bg: #1a1420;
    --panel: #221b28;
    --border: #3a2e42;
    --accent: #e88fb0;
    --text: #f0e6ec;
    --muted: #9a8ba0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Noto Sans KR", sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- 업로드 화면 ---------- */
  #upload-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 20px;
  }
  #upload-screen h1 { margin: 0 0 4px; font-size: 20px; }
  #upload-screen p.desc { color: var(--muted); margin: 0 0 12px; text-align: center; font-size: 14px; }
  .dropzones { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .dropzone {
    width: 260px;
    height: 160px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    text-align: center;
    padding: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(232,143,176,0.06);
  }
  .dropzone .icon { font-size: 28px; }
  .dropzone .title { font-weight: bold; font-size: 14px; }
  .dropzone .hint { font-size: 12px; color: var(--muted); }
  .dropzone .filename { font-size: 12px; color: var(--accent); word-break: break-all; padding: 0 8px; }
  .dropzone input[type=file] { display: none; }

  #start-btn {
    background: var(--accent);
    color: #2a2130;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
  }
  #start-btn.ready { opacity: 1; pointer-events: auto; }

  #reset-link {
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
  }

  /* ---------- 뷰어 화면 ---------- */
  #viewer-screen {
    display: none;
    height: 100%;
  }
  #viewer-screen.active { display: flex; }

  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  #sidebar h1 {
    font-size: 14px;
    padding: 0 16px 12px;
    margin: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sidebar h1 .new-btn {
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }
  .group-title {
    font-size: 12px;
    color: var(--muted);
    padding: 12px 16px 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .file-item {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 3px solid transparent;
  }
  .file-item:hover { background: rgba(232,143,176,0.08); }
  .file-item.active {
    border-left-color: var(--accent);
    background: rgba(232,143,176,0.15);
    color: var(--accent);
  }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #main-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #main-header .path { font-size: 14px; color: var(--muted); }
  #code-container { flex: 1; overflow: auto; margin: 0; }
  pre { margin: 0; height: 100%; }
  pre code.hljs {
    padding: 20px !important;
    min-height: 100%;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- ============ 업로드 화면 ============ -->
<div id="upload-screen">
  <h1>코드 파트 뷰어</h1>
  <p class="desc">
    index.html 안의 &lt;script&gt;/&lt;style&gt; 태그를 자동으로 파트별로 나눠 보여줍니다.<br>
    태그에 id를 붙여두면(예: &lt;script id="game-state"&gt;) json으로 이름/그룹을 지정할 수 있습니다. json은 선택사항입니다.
  </p>
  <div class="dropzones">
    <div class="dropzone" id="dz-html">
      <div class="icon">📄</div>
      <div class="title">index.html</div>
      <div class="hint">클릭하거나 드래그해서 넣기</div>
      <div class="filename" id="fn-html"></div>
      <input type="file" id="input-html" accept=".html,text/html">
    </div>
    <div class="dropzone" id="dz-json">
      <div class="icon">🗂️</div>
      <div class="title">manifest.json (선택)</div>
      <div class="hint">파트 이름/그룹 지정용</div>
      <div class="filename" id="fn-json"></div>
      <input type="file" id="input-json" accept=".json,application/json">
    </div>
  </div>
  <button id="start-btn">파트별로 보기</button>
</div>

<!-- ============ 뷰어 화면 ============ -->
<div id="viewer-screen">
  <div id="sidebar">
    <h1><span>파일 목록</span><span class="new-btn" id="new-btn">다른 파일 열기</span></h1>
    <div id="file-list"></div>
  </div>
  <div id="main">
    <div id="main-header">
      <span class="path" id="current-path"></span>
    </div>
    <div id="code-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
  // ============================================
  // 상태
  // ============================================
  let htmlText = null;
  let manifest = {}; // { [partId]: { label, group } }
  let parts = [];     // [{ id, type, group, label, content }]

  // ============================================
  // 파일 읽기 유틸
  // ============================================
  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  function setupDropzone(zoneId, inputId, filenameId, onFile) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);
    const fnLabel = document.getElementById(filenameId);

    zone.addEventListener("click", () => input.click());
    input.addEventListener("change", (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    ["dragover", "dragenter"].forEach((evt) =>
      zone.addEventListener(evt, (e) => {
        e.preventDefault();
        zone.classList.add("dragover");
      })
    );
    ["dragleave", "drop"].forEach((evt) =>
      zone.addEventListener(evt, (e) => {
        e.preventDefault();
        zone.classList.remove("dragover");
      })
    );
    zone.addEventListener("drop", (e) => {
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    async function handleFile(file) {
      fnLabel.textContent = file.name;
      const text = await readFileAsText(file);
      onFile(text, file.name);
      checkReady();
    }
  }

  function checkReady() {
    const btn = document.getElementById("start-btn");
    btn.classList.toggle("ready", !!htmlText);
  }

  setupDropzone("dz-html", "input-html", "fn-html", (text) => {
    htmlText = text;
  });
  setupDropzone("dz-json", "input-json", "fn-json", (text) => {
    try {
      manifest = JSON.parse(text);
    } catch (e) {
      alert("json 파일 형식이 올바르지 않습니다: " + e.message);
      manifest = {};
    }
  });

  document.getElementById("start-btn").addEventListener("click", () => {
    if (!htmlText) return;
    parseAndShow();
  });

  document.getElementById("new-btn").addEventListener("click", () => {
    document.getElementById("viewer-screen").classList.remove("active");
    document.getElementById("upload-screen").style.display = "flex";
  });

  // ============================================
  // 파싱: index.html -> parts 배열
  // ============================================
  function parseAndShow() {
    const doc = new DOMParser().parseFromString(htmlText, "text/html");
    parts = [];

    let scriptCount = 0;
    let styleCount = 0;

    doc.querySelectorAll("script").forEach((tag) => {
      scriptCount++;
      const id = tag.id || null;
      const meta = id && manifest[id] ? manifest[id] : null;
      if (tag.src) {
        parts.push({
          id: id || `script-${scriptCount}`,
          type: "external",
          group: (meta && meta.group) || "외부 스크립트",
          label: (meta && meta.label) || `외부 스크립트: ${tag.getAttribute("src")}`,
          content: `<!-- 이 index.html이 참조하는 외부 파일입니다. 내용을 보려면 해당 파일을 직접 열어야 합니다. -->\nsrc="${tag.getAttribute("src")}"`,
        });
      } else {
        parts.push({
          id: id || `script-${scriptCount}`,
          type: "javascript",
          group: (meta && meta.group) || (id ? "스크립트" : `스크립트 (id 없음)`),
          label: (meta && meta.label) || (id ? id : `script #${scriptCount} (id 없음 - 파트 이름을 붙이려면 id 속성을 추가하세요)`),
          content: tag.textContent,
        });
      }
    });

    doc.querySelectorAll("style").forEach((tag) => {
      styleCount++;
      const id = tag.id || null;
      const meta = id && manifest[id] ? manifest[id] : null;
      parts.push({
        id: id || `style-${styleCount}`,
        type: "css",
        group: (meta && meta.group) || (id ? "스타일" : "스타일 (id 없음)"),
        label: (meta && meta.label) || (id ? id : `style #${styleCount} (id 없음)`),
        content: tag.textContent,
      });
    });

    // 구조: script/style 내용을 비운 뼈대 HTML
    const clone = doc.documentElement.cloneNode(true);
    clone.querySelectorAll("script:not([src])").forEach((s) => (s.textContent = "  /* 내용은 왼쪽 스크립트 파트 참고 */"));
    clone.querySelectorAll("style").forEach((s) => (s.textContent = "  /* 내용은 왼쪽 스타일 파트 참고 */"));
    parts.unshift({
      id: "__structure__",
      type: "html",
      group: "구조",
      label: (manifest.__structure__ && manifest.__structure__.label) || "구조 (HTML 뼈대)",
      content: "<!DOCTYPE html>\n" + clone.outerHTML,
    });

    renderViewer();
  }

  // ============================================
  // 뷰어 렌더링
  // ============================================
  function renderViewer() {
    document.getElementById("upload-screen").style.display = "none";
    document.getElementById("viewer-screen").classList.add("active");

    const listEl = document.getElementById("file-list");
    listEl.innerHTML = "";

    const groups = {};
    parts.forEach((p) => {
      if (!groups[p.group]) groups[p.group] = [];
      groups[p.group].push(p);
    });

    Object.keys(groups).forEach((groupName) => {
      const title = document.createElement("div");
      title.className = "group-title";
      title.textContent = groupName;
      listEl.appendChild(title);

      groups[groupName].forEach((p) => {
        const item = document.createElement("div");
        item.className = "file-item";
        item.textContent = p.label;
        item.dataset.id = p.id;
        item.onclick = () => showPart(p);
        listEl.appendChild(item);
      });
    });

    if (parts.length) showPart(parts[0]);
  }

  function showPart(part) {
    document.querySelectorAll(".file-item").forEach((el) => {
      el.classList.toggle("active", el.dataset.id === part.id);
    });
    document.getElementById("current-path").textContent = part.label;

    const container = document.getElementById("code-container");
    container.innerHTML = "";
    const pre = document.createElement("pre");
    const code = document.createElement("code");
    code.className = "language-" + part.type;
    code.textContent = part.content;
    pre.appendChild(code);
    container.appendChild(pre);
    hljs.highlightElement(code);
  }
</script>
</body>
</html>
