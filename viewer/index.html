<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 뷰어 - 벚꽃 내리는 시대에 결투를</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  :root {
    --bg: #1a1420;
    --panel: #221b28;
    --border: #3a2e42;
    --accent: #e88fb0;
    --text: #f0e6ec;
    --muted: #9a8ba0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", "Noto Sans KR", sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  #sidebar h1 {
    font-size: 15px;
    padding: 0 16px 12px;
    margin: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .group-title {
    font-size: 12px;
    color: var(--muted);
    padding: 12px 16px 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .file-item {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 3px solid transparent;
  }
  .file-item:hover { background: rgba(232,143,176,0.08); }
  .file-item.active {
    border-left-color: var(--accent);
    background: rgba(232,143,176,0.15);
    color: var(--accent);
  }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #main-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  #main-header .path {
    font-size: 14px;
    color: var(--muted);
  }
  #main-header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
  }
  #code-container {
    flex: 1;
    overflow: auto;
    margin: 0;
  }
  pre {
    margin: 0;
    height: 100%;
  }
  pre code.hljs {
    padding: 20px !important;
    min-height: 100%;
    font-size: 13px;
    line-height: 1.6;
  }
  #empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
  }
  .loading { padding: 20px; color: var(--muted); }
</style>
</head>
<body>
  <div id="sidebar">
    <h1>파일 목록</h1>
    <div id="file-list"></div>
  </div>
  <div id="main">
    <div id="main-header" style="display:none;">
      <span class="path" id="current-path"></span>
      <a id="github-link" href="#" target="_blank">GitHub에서 보기 →</a>
    </div>
    <div id="code-container">
      <div id="empty-state">왼쪽에서 파일을 선택하세요</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // ============================================
    // GitHub repo 주소 (GitHub에서 보기 링크용). 저장소 만든 뒤 수정하세요.
    // ============================================
    const GITHUB_REPO_URL = "https://github.com/USERNAME/REPO/blob/main";

    let filesManifest = [];
    let activeFile = null;

    async function init() {
      const res = await fetch("files.json");
      filesManifest = await res.json();
      renderSidebar();

      // URL 해시로 특정 파일 바로 열기 지원: viewer/#js/main.js
      const hash = decodeURIComponent(location.hash.slice(1));
      const target = filesManifest.find((f) => f.label === hash) || filesManifest[0];
      if (target) openFile(target);
    }

    function renderSidebar() {
      const listEl = document.getElementById("file-list");
      listEl.innerHTML = "";

      const groups = {};
      filesManifest.forEach((f) => {
        if (!groups[f.group]) groups[f.group] = [];
        groups[f.group].push(f);
      });

      Object.keys(groups).forEach((groupName) => {
        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = groupName;
        listEl.appendChild(title);

        groups[groupName].forEach((f) => {
          const item = document.createElement("div");
          item.className = "file-item";
          item.textContent = f.label;
          item.dataset.label = f.label;
          item.onclick = () => openFile(f);
          listEl.appendChild(item);
        });
      });
    }

    async function openFile(fileInfo) {
      activeFile = fileInfo;
      location.hash = encodeURIComponent(fileInfo.label);

      document.querySelectorAll(".file-item").forEach((el) => {
        el.classList.toggle("active", el.dataset.label === fileInfo.label);
      });

      document.getElementById("main-header").style.display = "flex";
      document.getElementById("current-path").textContent = fileInfo.path.replace("../", "");
      document.getElementById("github-link").href =
        GITHUB_REPO_URL + "/" + fileInfo.path.replace("../", "");

      const container = document.getElementById("code-container");
      container.innerHTML = '<div class="loading">불러오는 중...</div>';

      try {
        const res = await fetch(fileInfo.path);
        const text = await res.text();
        const ext = fileInfo.path.split(".").pop();
        const lang = { js: "javascript", css: "css", html: "html", json: "json" }[ext] || "plaintext";

        const pre = document.createElement("pre");
        const code = document.createElement("code");
        code.className = "language-" + lang;
        code.textContent = text;
        pre.appendChild(code);
        container.innerHTML = "";
        container.appendChild(pre);
        hljs.highlightElement(code);
      } catch (e) {
        container.innerHTML = '<div class="loading">불러오기 실패: ' + e.message + "</div>";
      }
    }

    init();
  </script>
</body>
</html>
